<!doctype html><html><body>
<h2>Recuperar senha</h2>
{% with messages = get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<p>{{m}}</p>{% endfor %}{% endwith %}
<form method="post">
  <input name="email" type="email" placeholder="Email" required />
  <button type="submit">Gerar token</button>
</form>
{% if token %}
<p>Token de recuperação: <strong>{{ token }}</strong></p>
<p><a href="/reset-password">Ir para redefinir senha</a></p>
{% endif %}
<p><a href="/login">Voltar ao login</a></p>
</body></html>
