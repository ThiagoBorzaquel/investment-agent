<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Investment Agent</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .group { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .item { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 8px; }
    input, textarea { width: 100%; padding: 10px; box-sizing: border-box; }
    button { padding: 8px 12px; cursor: pointer; }
    .btn-danger { background: #ffe7e7; border: 1px solid #efb0b0; }
    .flash { padding: 10px; border-radius: 8px; margin: 10px 0; }
    .success { background: #e6ffed; }
    .error { background: #ffecec; }
  </style>
</head>
<body>
  <h1>Dashboard Admin</h1>
  <p>Campos com adicionar/editar/apagar para prompts e URLs.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="group">
      <h3>Lista de URLs</h3>
      <div id="site_urls_container"></div>
      <button type="button" onclick="addItem('site_urls_container','site_urls','https://')">+ Adicionar URL</button>
    </div>

    <div class="group">
      <h3>Prompts de geração do post</h3>
      <div id="post_prompts_container"></div>
      <button type="button" onclick="addItem('post_prompts_container','post_prompts','Novo prompt de post')">+ Adicionar prompt post</button>
    </div>

    <div class="group">
      <h3>Prompts de geração da imagem</h3>
      <div id="image_prompts_container"></div>
      <button type="button" onclick="addItem('image_prompts_container','image_prompts','Novo prompt de imagem')">+ Adicionar prompt imagem</button>
    </div>

    <div class="row">
      <div>
        <label>Instagram User ID</label>
        <input name="instagram_user_id" value="{{ settings.instagram_user_id or '' }}" />
      </div>
      <div>
        <label>Instagram Access Token</label>
        <input name="instagram_access_token" value="{{ settings.instagram_access_token or '' }}" />
      </div>
    </div>

    <label>URL pública da imagem (INSTAGRAM_IMAGE_URL)</label>
    <input name="instagram_image_url" value="{{ settings.instagram_image_url or '' }}" />

    <div class="row">
      <div>
        <label>OpenAI API Key</label>
        <input name="openai_api_key" value="{{ settings.openai_api_key or '' }}" />
      </div>
      <div>
        <label>Horários (HH:MM, separados por vírgula)</label>
        <input name="schedule_times" value="{{ (settings.schedule_times or ['09:00'])|join(',') }}" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Modelo de texto</label>
        <input name="openai_text_model" value="{{ settings.openai_text_model or 'gpt-4.1-mini' }}" />
      </div>
      <div>
        <label>Modelo de imagem</label>
        <input name="openai_image_model" value="{{ settings.openai_image_model or 'gpt-image-1' }}" />
      </div>
    </div>

    <label>Timezone</label>
    <input name="timezone" value="{{ settings.timezone or 'America/Sao_Paulo' }}" />

    <button type="submit">Salvar configurações</button>
  </form>

  <form method="post" action="/run-now">
    <button type="submit">Executar post agora</button>
  </form>

  <script>
    function addItem(containerId, inputName, value = '') {
      const container = document.getElementById(containerId);
      const wrapper = document.createElement('div');
      wrapper.className = 'item';

      const input = document.createElement('textarea');
      input.name = inputName;
      input.value = value;
      input.rows = 3;

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'btn-danger';
      removeBtn.textContent = 'Apagar';
      removeBtn.onclick = () => wrapper.remove();

      wrapper.appendChild(input);
      wrapper.appendChild(removeBtn);
      container.appendChild(wrapper);
    }

    const initialSiteUrls = {{ (settings.site_urls or []) | tojson }};
    const initialPostPrompts = {{ (settings.post_prompts or []) | tojson }};
    const initialImagePrompts = {{ (settings.image_prompts or []) | tojson }};

    (initialSiteUrls.length ? initialSiteUrls : ['']).forEach(v => addItem('site_urls_container', 'site_urls', v));
    (initialPostPrompts.length ? initialPostPrompts : ['']).forEach(v => addItem('post_prompts_container', 'post_prompts', v));
    (initialImagePrompts.length ? initialImagePrompts : ['']).forEach(v => addItem('image_prompts_container', 'image_prompts', v));
  </script>
</body>
</html>
