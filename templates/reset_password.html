<!doctype html><html><body>
<h2>Redefinir senha</h2>
{% with messages = get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<p>{{m}}</p>{% endfor %}{% endwith %}
<form method="post">
  <input name="token" placeholder="Token" required />
  <input name="new_password" type="password" placeholder="Nova senha" required />
  <button type="submit">Redefinir</button>
</form>
<p><a href="/login">Voltar ao login</a></p>
</body></html>
